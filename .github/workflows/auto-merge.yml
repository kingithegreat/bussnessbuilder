name: Auto-merge claude branches

# Stage 1 of the workforce merge pipeline. When an AI session pushes a
# `claude/**` branch, open a PR to main (if one doesn't exist yet). It then
# *best-effort* enables GitHub native auto-merge; if that repo setting is off,
# the companion workflow `auto-merge-on-green.yml` still merges the PR directly
# once CI (ci.yml: lint + test + build) passes — so the pipeline runs end-to-end
# even with no admin settings configured.
#
# Required (one-time, in repo Settings — without it `gh pr create` 403s):
#   - Settings -> Actions -> General -> Workflow permissions ->
#     "Allow GitHub Actions to create and approve pull requests"  (toggle ON)
#
# Optional hardening (improves native auto-merge; not needed for the green-merge
# fallback to work):
#   - Settings -> General -> "Allow auto-merge"  (toggle ON)
#   - Settings -> Branches -> branch protection on `main` requiring the
#     "verify" check from CI, so merges wait for green.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr-and-enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR (if missing) and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"

          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No open PR for $BRANCH — creating one."
            TITLE=$(git log -1 --pretty=%s)
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "$TITLE" \
              --body "Automated PR for \`$BRANCH\`. Auto-merges to \`main\` once CI is green." \
              || true
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          else
            echo "Existing open PR #$PR for $BRANCH."
          fi

          if [ -z "$PR" ]; then
            echo "Could not determine a PR number; nothing to auto-merge."
            exit 0
          fi

          # Best-effort: enable native auto-merge if the repo allows it. If not,
          # auto-merge-on-green.yml merges this PR directly once CI passes, so a
          # failure here is informational, not fatal.
          if gh pr merge "$PR" --auto --squash 2>/dev/null; then
            echo "Native auto-merge enabled on PR #$PR."
          else
            echo "::notice::Native auto-merge unavailable (repo setting off). auto-merge-on-green.yml will merge PR #$PR once CI is green."
          fi
