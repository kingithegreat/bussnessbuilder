name: Auto-merge claude branches

# When an AI session pushes a `claude/**` branch, open a PR to main (if one
# doesn't exist yet) and enable GitHub native auto-merge. The PR's required
# checks come from ci.yml (lint + test + build on pull_request), so the merge
# only happens once CI is green.
#
# Prerequisites (one-time, in repo Settings):
#   - Settings -> General -> "Allow auto-merge"  (toggle ON)
#   - Settings -> Branches -> branch protection on `main` requiring the
#     "verify" check from CI, so auto-merge waits for green instead of merging
#     immediately.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  open-pr-and-enable-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR (if missing) and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"

          PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "No open PR for $BRANCH — creating one."
            TITLE=$(git log -1 --pretty=%s)
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "$TITLE" \
              --body "Automated PR for \`$BRANCH\`. Auto-merges to \`main\` once CI is green." \
              || true
            PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          else
            echo "Existing open PR #$PR for $BRANCH."
          fi

          if [ -z "$PR" ]; then
            echo "Could not determine a PR number; nothing to auto-merge."
            exit 0
          fi

          if gh pr merge "$PR" --auto --squash; then
            echo "Auto-merge enabled on PR #$PR."
          else
            echo "::warning::Could not enable auto-merge on PR #$PR. Enable 'Allow auto-merge' in repo settings and add branch protection requiring the CI check."
          fi
