name: Snapshot Notion brain

# Mirrors the Notion brain pages into durable, git-versioned backups:
#   "💼 BusinessFlow" brief       → docs/brain-snapshot.md
#   "📚 Lessons & Playbook" rules → docs/playbook-snapshot.md
# Runs daily and can be triggered manually.
#
# ── Required secret ─────────────────────────────────────────────────────────
#   NOTION_TOKEN  — a Notion *internal integration* secret.
#     1. Create one at https://www.notion.so/my-integrations (New integration →
#        copy the "Internal Integration Secret", starts with `ntn_`).
#     2. Share the brain page with it: open the Notion "💼 BusinessFlow" page →
#        ••• menu → Connections → add your integration (this also covers reading
#        its blocks).
#     3. Add it at: repo → Settings → Secrets and variables → Actions → Secrets
#        → New repository secret → name `NOTION_TOKEN`.
#   (The token is read from the secret at runtime and is never written to the repo.)
#
# ── Optional variables ──────────────────────────────────────────────────────
#   NOTION_BRAIN_PAGE_ID    — overrides the default brief page id.
#   NOTION_PLAYBOOK_PAGE_ID — overrides the default Lessons & Playbook page id.
#     Add under Settings → Secrets and variables → Actions → Variables. Not
#     sensitive.

on:
  schedule:
    - cron: '17 6 * * *' # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notion-brain-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify NOTION_TOKEN is configured
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [[ -z "$NOTION_TOKEN" ]]; then
            echo "::error::NOTION_TOKEN secret is missing. Add it under Settings → Secrets and variables → Actions → Secrets, then re-run."
            exit 1
          fi

      - name: Generate snapshots from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BRAIN_PAGE_ID: ${{ vars.NOTION_BRAIN_PAGE_ID }}
          NOTION_PLAYBOOK_PAGE_ID: ${{ vars.NOTION_PLAYBOOK_PAGE_ID }}
        # A missing token or any Notion 401/403/404 makes this step exit non-zero,
        # which fails the whole job — no silent success.
        run: node scripts/snapshot-notion-brain.mjs

      - name: Commit snapshots if content changed
        run: |
          set -euo pipefail
          # Ignore timestamp-only diffs (the "Last generated" line) so we commit
          # only on real content changes. Any Notion error already failed the job
          # in the step above, so reaching here means the snapshots are valid.
          # `git add -N` makes a first-time (untracked) snapshot show up in the
          # diff instead of being silently skipped.
          git add -N docs/brain-snapshot.md docs/playbook-snapshot.md
          if git diff --quiet -I 'Last generated' -- docs/brain-snapshot.md docs/playbook-snapshot.md; then
            echo "Brain snapshot content unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/brain-snapshot.md docs/playbook-snapshot.md
            git commit -m "chore: snapshot Notion brain ($(date -u +%Y-%m-%d))"
            git push
          fi
